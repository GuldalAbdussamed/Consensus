<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Avatar Testi — Engelsiz TV</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #1a1a1a; 
            color: white; 
            font-family: 'Inter', sans-serif; 
        }
        #canvas-container { 
            width: 100vw; 
            height: 100vh; 
            position: absolute; 
            top: 0; 
            left: 0; 
            z-index: 1; 
        }
        .ui-container { 
            position: absolute; 
            bottom: 30px; 
            left: 50%; 
            transform: translateX(-50%); 
            z-index: 10; 
            background: rgba(20, 20, 20, 0.85); 
            backdrop-filter: blur(10px);
            padding: 24px; 
            border-radius: 16px; 
            display: flex; 
            flex-direction: column; 
            gap: 16px; 
            min-width: 350px; 
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #status {
            font-size: 14px;
            color: #aaa;
            font-weight: 500;
        }
        .input-group {
            display: flex; 
            gap: 12px; 
        }
        input { 
            padding: 12px 16px; 
            border-radius: 8px; 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            background: rgba(0, 0, 0, 0.5);
            color: white;
            outline: none; 
            flex: 1;
            font-family: inherit;
        }
        input:focus {
            border-color: #CC0000;
        }
        button { 
            padding: 12px 24px; 
            background: #CC0000; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: 600;
            font-family: inherit;
            transition: background 0.2s;
        }
        button:hover { 
            background: #ff1a1a; 
        }
        .back-link { 
            position: absolute; 
            top: 24px; 
            left: 24px; 
            z-index: 10; 
            color: white; 
            text-decoration: none; 
            background: rgba(20, 20, 20, 0.85); 
            backdrop-filter: blur(10px);
            padding: 12px 20px; 
            border-radius: 8px; 
            font-weight: 500;
            font-size: 14px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s;
        }
        .back-link:hover {
            background: rgba(40, 40, 40, 0.9);
            border-color: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← Ana Sayfa'ya Dön</a>
    
    <div id="canvas-container"></div>
    
    <div class="ui-container">
        <div id="status">Model Yükleniyor...</div>
        <div class="input-group">
            <input type="text" id="gloss-input" placeholder="Örn: MERHABA, EVET, ZIPLA">
            <button id="play-btn">Oynat</button>
        </div>
    </div>

    <!-- Script as module to support Three.js imports -->
    <script type="module" src="app.js"></script>
</body>
</html>
